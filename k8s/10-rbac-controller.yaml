# 統合AI の ServiceAccount。書き込み権限を sandbox に限定する（権限境界の強制）。
# prod namespace への Role/Binding は意図的に一切作らない → AI は prod を変更不能。
apiVersion: v1
kind: ServiceAccount
metadata: { name: improvement-controller, namespace: platform }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: sandbox-operator, namespace: sandbox }
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "services", "pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: controller-sandbox, namespace: sandbox }
subjects:
  - kind: ServiceAccount
    name: improvement-controller
    namespace: platform
roleRef:
  kind: Role
  name: sandbox-operator
  apiGroup: rbac.authorization.k8s.io
